AWSTemplateFormatVersion: "2010-09-09"
Description: >
  FLUX.1-dev + LoRA on AWS EC2 g5.xlarge (A10G 24 GB VRAM).
  Provisions: VPC, public subnet, security group, IAM instance profile,
  EBS volume for models, and an on-demand EC2 instance running ComfyUI directly
  via Python + systemd (no Docker). ComfyUI is accessible on port 8188.
  Notes:
    - Root filesystem is XFS — growpart + xfs_growfs used (not resize2fs)
    - Python 3.11 required for ComfyUI (comfy-kitchen>=0.2.8 needs Python 3.10+)
    - PyTorch venv installed on /data to avoid filling the 100 GB root volume
    - Models stored on retained EBS volume (/data) — survive stack delete
    - 20 GB swapfile on /data required: g5.xlarge has 16 GB RAM, unet is ~17 GB (mmap needs swap)

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  AllowedCidr:
    Type: String
    Description: >
      Your workstation public IP in CIDR notation (e.g. 203.0.113.5/32).
      Only this address can reach ComfyUI (port 8188) and SSH (port 22).
      Find yours at https://checkip.amazonaws.com
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"
    ConstraintDescription: Must be a valid IPv4 CIDR block.

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access. Must already exist in this region.

  SpotMaxPrice:
    Type: String
    Default: "0.50"
    Description: >-
      Reserved for future spot use. Not currently used (on-demand mode).

  ModelsBucketName:
    Type: String
    Default: ""
    Description: >
      S3 bucket name containing the LoRA file.
      The instance will download models/loras/NSFW_master_ZIT_000008766.safetensors
      from this bucket on first boot. Upload with: ./setup.sh --upload-lora

  HfToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: >
      HuggingFace token (REQUIRED). Used to download all models: FLUX.1-dev unet,
      CLIP encoders, and ae.safetensors VAE. Your token must have accepted the BFL
      license at huggingface.co/black-forest-labs/FLUX.1-dev.
      Store in AWS Secrets Manager for production use.

  EbsVolumeSize:
    Type: Number
    Default: 150
    MinValue: 100
    Description: Size of the EBS gp3 data volume in GB. 150 GB recommended (models ~28 GB + room).

  InstanceType:
    Type: String
    Default: g5.xlarge
    AllowedValues:
      - g5.xlarge       # A10G 24 GB  — recommended, best price/performance
      - g6.xlarge       # L4  24 GB   — alternative
    Description: GPU instance type. g5.xlarge (A10G 24 GB) is recommended.

  AvailabilityZone:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1b
    Description: >
      AZ for the subnet and EBS volume. Both must be in the same AZ.
      g5.xlarge is unavailable in us-east-1a — use us-east-1b/c/d/f.

  ExistingVolumeId:
    Type: String
    Default: ""
    Description: >
      (Optional) ID of a pre-existing EBS volume to attach (e.g. vol-0c1ab9ebeb15c4bc0).
      Use this to reuse a volume from a previous stack that was retained on delete.
      Leave blank to create a new volume.

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  HasS3Bucket:       !Not [!Equals [!Ref ModelsBucketName, ""]]
  HasHfToken:        !Not [!Equals [!Ref HfToken, ""]]
  HasExistingVolume: !Not [!Equals [!Ref ExistingVolumeId, ""]]
  CreateNewVolume:   !Equals [!Ref ExistingVolumeId, ""]

# ---------------------------------------------------------------------------
# Mappings — latest Deep Learning AMI (Amazon Linux 2023, GPU)
# Update AMI IDs if deploying in other regions.
# Source: aws ec2 describe-images --owners amazon \
#   --filters "Name=name,Values=Deep Learning Base OSS Nvidia Driver GPU AMI (Amazon Linux 2023)*"
# ---------------------------------------------------------------------------
Mappings:
  RegionAMI:
    us-east-1:
      AMI: ami-0a358baf4ce730c1a   # Deep Learning Base OSS Nvidia Driver GPU AMI (Amazon Linux 2023) 20260403
    us-west-2:
      AMI: ami-0b20a6f09484773af
    eu-west-1:
      AMI: ami-0c1bc246476a5572b
    ap-southeast-1:
      AMI: ami-0abcdef1234567890   # Replace with correct AMI for your region
    ap-northeast-1:
      AMI: ami-0fedcba9876543210   # Replace with correct AMI for your region

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # --- Networking -----------------------------------------------------------

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-igw"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Ref AvailabilityZone
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-subnet"

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-rt"

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  # --- Security Group -------------------------------------------------------

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "FLUX.1 ComfyUI - restricted to workstation IP only"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCidr
          Description: SSH from workstation
        - IpProtocol: tcp
          FromPort: 8188
          ToPort: 8188
          CidrIp: !Ref AllowedCidr
          Description: ComfyUI from workstation
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: All outbound (HuggingFace downloads, apt, Docker pull)
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-sg"

  # --- IAM ------------------------------------------------------------------

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-instance-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore  # Session Manager access
      Policies:
        - PolicyName: S3LoraReadPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource: !If
                  - HasS3Bucket
                  - - !Sub "arn:aws:s3:::${ModelsBucketName}"
                    - !Sub "arn:aws:s3:::${ModelsBucketName}/models/loras/*"
                  - - !Sub "arn:aws:s3:::${AWS::StackName}-placeholder"
                    - !Sub "arn:aws:s3:::${AWS::StackName}-placeholder/*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${AWS::StackName}-instance-profile"
      Roles:
        - !Ref InstanceRole

  # --- EBS Data Volume ------------------------------------------------------
  # Separate from root volume so models survive instance replacement.
  # Skipped when ExistingVolumeId is provided.

  ModelsVolume:
    Type: AWS::EC2::Volume
    Condition: CreateNewVolume
    DeletionPolicy: Retain   # IMPORTANT: retain models on stack delete
    Properties:
      AvailabilityZone: !Ref AvailabilityZone
      Size: !Ref EbsVolumeSize
      VolumeType: gp3
      Throughput: 250        # MB/s — gp3 baseline; increase to 1000 for faster model loads
      Iops: 3000
      Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-models"

  # --- Launch Template (On-Demand) -----------------------------------------

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${AWS::StackName}-lt"
      LaunchTemplateData:
        ImageId: !FindInMap [RegionAMI, !Ref "AWS::Region", AMI]
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyPairName
        IamInstanceProfile:
          Arn: !GetAtt InstanceProfile.Arn
        SecurityGroupIds:
          - !Ref SecurityGroup
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 100       # root volume — OS + system packages (min 75 GB for this AMI)
              VolumeType: gp3
              DeleteOnTermination: true
              Encrypted: true
        MetadataOptions:
          HttpTokens: required          # IMDSv2 only — security best practice
          HttpPutResponseHopLimit: 1
        UserData:
          Fn::Base64: !Sub
            - |
              #!/bin/bash
              set -euo pipefail
              exec > >(tee /var/log/flux-setup.log | logger -t flux-setup) 2>&1

              echo "=== FLUX.1-dev ComfyUI Setup ==="
              echo "Instance: $(curl -s http://169.254.169.254/latest/meta-data/instance-type)"
              echo "Region:   ${AWS::Region}"

              # --- Wait for NVIDIA driver ---
              echo "Waiting for NVIDIA driver..."
              timeout 120 bash -c 'until nvidia-smi &>/dev/null; do sleep 5; done'
              nvidia-smi

              # --- Grow root partition to full allocated EBS size ---
              # The Deep Learning AMI snapshot is smaller than the allocated VolumeSize.
              # Root filesystem is XFS — must use xfs_growfs, NOT resize2fs.
              growpart /dev/nvme0n1 1 || true
              xfs_growfs /
              df -h /

              # --- Install dependencies ---
              # python3.11 required: ComfyUI's comfy-kitchen>=0.2.8 needs Python 3.10+
              # The AMI ships Python 3.9 as default — install 3.11 explicitly.
              dnf install -y git python3.11 python3.11-devel gcc

              # --- Attach and mount EBS data volume ---
              DEVICE=/dev/nvme1n1
              MOUNT=/data
              echo "Waiting for $DEVICE..."
              timeout 120 bash -c "until [ -b $DEVICE ]; do sleep 3; done"
              if ! blkid $DEVICE; then
                echo "Formatting $DEVICE (first boot)..."
                mkfs.ext4 -F $DEVICE
              fi
              mkdir -p $MOUNT
              mount $DEVICE $MOUNT
              echo "$DEVICE $MOUNT ext4 defaults,nofail 0 2" >> /etc/fstab

              # --- Create model directories ---
              mkdir -p $MOUNT/models/{unet,clip,vae,loras,checkpoints}
              mkdir -p $MOUNT/{input,output,custom_nodes,workflows}
              # Clear stale HF download locks from any aborted prior runs.
              # Without this, re-runs fail with: PermissionError [Errno 13] *.lock
              find $MOUNT -name "*.lock" -delete 2>/dev/null || true
              chown -R ec2-user:ec2-user $MOUNT

              # --- Add swap on EBS ---
              # g5.xlarge has 16 GB RAM but the FLUX unet is ~17 GB.
              # safetensors mmaps the full file into CPU address space on load,
              # which fails with ENOMEM without swap. 20 GB on /data is sufficient.
              if [[ ! -f $MOUNT/swapfile ]]; then
                fallocate -l 20G $MOUNT/swapfile
                chmod 600 $MOUNT/swapfile
                mkswap $MOUNT/swapfile
              fi
              swapon $MOUNT/swapfile || true
              echo "$MOUNT/swapfile none swap sw 0 0" >> /etc/fstab

              # --- Install HuggingFace Hub (python3.11 for consistency with venv) ---
              python3.11 -m pip install -q --upgrade "huggingface_hub" "hf_transfer"

              # Write download helper using the Python API (avoids CLI path issues)
              printf '%s\n' \
                'import sys' \
                'from huggingface_hub import hf_hub_download' \
                'repo, local_dir, token = sys.argv[1], sys.argv[2], sys.argv[3]' \
                'for fname in sys.argv[4:]:' \
                '    print(fname, flush=True)' \
                '    hf_hub_download(repo_id=repo, filename=fname, local_dir=local_dir, token=token)' \
                > /tmp/hf_dl.py

              # --- Clone ComfyUI ---
              COMFYUI_DIR=/opt/ComfyUI
              git clone https://github.com/comfyanonymous/ComfyUI.git $COMFYUI_DIR

              # Clone ComfyUI Manager into the EBS custom_nodes dir
              git clone https://github.com/ltdrdata/ComfyUI-Manager.git \
                $MOUNT/custom_nodes/ComfyUI-Manager

              # Symlink all data dirs from EBS into ComfyUI (models, inputs, outputs, custom nodes)
              for d in models input output custom_nodes; do
                rm -rf $COMFYUI_DIR/$d
                ln -s $MOUNT/$d $COMFYUI_DIR/$d
              done
              chown -R ec2-user:ec2-user $COMFYUI_DIR

              # --- Install PyTorch + ComfyUI requirements into venv on EBS ---
              # MUST install to /data/venv — PyTorch (~3 GB) + deps would fill the root volume.
              # python3.11 required for comfy-kitchen>=0.2.8 (Python 3.10+ constraint).
              python3.11 -m venv /data/venv
              /data/venv/bin/pip install -q --upgrade pip
              /data/venv/bin/pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu124
              /data/venv/bin/pip install -r $COMFYUI_DIR/requirements.txt

              # --- Download models from HuggingFace ---
              # IMPORTANT: HF token must have accepted the BFL license at:
              #   https://huggingface.co/black-forest-labs/FLUX.1-dev
              # HfToken is embedded in UserData (base64). Use Secrets Manager for production.
              if [[ -z "${HfToken}" ]]; then
                echo "ERROR: HfToken parameter is required. Cannot download models."
                exit 1
              fi

              echo "Downloading FLUX.1-dev unet (fp8, ~17 GB)..."
              python3.11 /tmp/hf_dl.py "Comfy-Org/flux1-dev" \
                "$MOUNT/models/unet" "${HfToken}" \
                "flux1-dev-fp8.safetensors"

              echo "Downloading CLIP encoders (~10 GB total)..."
              python3.11 /tmp/hf_dl.py "comfyanonymous/flux_text_encoders" \
                "$MOUNT/models/clip" "${HfToken}" \
                "clip_l.safetensors" "t5xxl_fp8_e4m3fn.safetensors"

              echo "Downloading VAE (ae.safetensors, ~335 MB)..."
              python3.11 /tmp/hf_dl.py "black-forest-labs/FLUX.1-dev" \
                "$MOUNT/models/vae" "${HfToken}" \
                "ae.safetensors"

              # --- Download LoRA ---
              ${LORA_DOWNLOAD_CMD}

              # Final ownership fix — HF downloads create .cache dirs as root
              chown -R ec2-user:ec2-user $MOUNT

              # --- Install comfyui_controlnet_aux ---
              if [ ! -d "$MOUNT/custom_nodes/comfyui_controlnet_aux" ]; then
                git clone https://github.com/Fannovel16/comfyui_controlnet_aux.git $MOUNT/custom_nodes/comfyui_controlnet_aux
                /data/venv/bin/pip install -q -r $MOUNT/custom_nodes/comfyui_controlnet_aux/requirements.txt
              fi

              # --- Create systemd service ---
              cat > /etc/systemd/system/comfyui.service << 'SERVICE'
[Unit]
Description=ComfyUI
After=network.target

[Service]
Type=simple
User=ec2-user
WorkingDirectory=/home/ec2-user/ComfyUI
ExecStart=/data/venv/bin/python main.py --listen 0.0.0.0 --port 8188
Restart=on-failure
RestartSec=5
StandardOutput=journal
StandardError=journal

[Install]
WantedBy=multi-user.target
SERVICE

              systemctl daemon-reload
              systemctl enable --now comfyui

              echo "=== Setup complete ==="
              echo "ComfyUI available at http://$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4):8188"
            - LORA_DOWNLOAD_CMD: !If
                - HasS3Bucket
                - !Sub "aws s3 cp s3://${ModelsBucketName}/models/loras/NSFW_master_ZIT_000008766.safetensors /data/models/loras/NSFW_master_ZIT_000008766.safetensors"
                - "echo 'No S3 bucket configured - upload NSFW_master_ZIT_000008766.safetensors to /data/models/loras/ manually'"

  # --- EC2 Instance ---------------------------------------------------------

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      SubnetId: !Ref PublicSubnet
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-comfyui"

  # --- Attach EBS to Instance -----------------------------------------------

  VolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      InstanceId: !Ref Instance
      VolumeId: !If [HasExistingVolume, !Ref ExistingVolumeId, !Ref ModelsVolume]
      Device: /dev/sdf      # shown as /dev/nvme1n1 inside AL2023

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  InstanceId:
    Description: EC2 instance ID
    Value: !Ref Instance

  PublicIP:
    Description: Public IP address of the instance
    Value: !GetAtt Instance.PublicIp

  ComfyUIURL:
    Description: ComfyUI URL (open in browser once setup completes ~5-10 min)
    Value: !Sub "http://${Instance.PublicIp}:8188"

  SSHCommand:
    Description: SSH command to connect
    Value: !Sub "ssh -i ~/.ssh/${KeyPairName}.pem ec2-user@${Instance.PublicIp}"

  SetupLog:
    Description: Watch setup progress on the instance
    Value: "sudo tail -f /var/log/flux-setup.log"

  ModelsVolumeId:
    Description: EBS volume ID for models (retained on stack delete)
    Value: !If [HasExistingVolume, !Ref ExistingVolumeId, !Ref ModelsVolume]
