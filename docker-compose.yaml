services:
  comfyui:
    build: .
    image: proto-comfyui:local
    ports:
      - "1111:1111"
      - "8188:8188"
    volumes:
      - ./models:/opt/ComfyUI/models
      - ./input:/opt/ComfyUI/input
      - ./output:/opt/ComfyUI/output
      - ./custom_nodes:/opt/ComfyUI/custom_nodes
    environment:
        - NVIDIA_VISIBLE_DEVICES=all
        - NVIDIA_DRIVER_CAPABILITIES=all
        - WEB_AUTHENTICATION=false
        - WEB_USER=user
        - WEB_PASSWORD=password
        # --lowvram offloads pipeline stages to system RAM between steps,
        # keeping peak VRAM under 8 GB on the RTX 3060 Ti.
        - EXTRA_ARGS=--lowvram
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]