# ---------------------------------------------------------------------------
# KSAMPLER RECOMMENDED SETTINGS
# ---------------------------------------------------------------------------

ksampler_settings:
  # --- Pony Diffusion V6 XL ---
  pony_single_person:
    steps: 20
    cfg_scale: 7
    sampler: dpmpp_2m
    scheduler: karras
    denoise: 1.0
    resolution: "896x1152"

  pony_multi_person:
    steps: 30
    cfg_scale: 6
    sampler: dpmpp_2m
    scheduler: karras
    denoise: 1.0
    resolution: "1216x832"

  pony_img2img:
    steps: 20
    cfg_scale: 7
    sampler: dpmpp_2m
    scheduler: karras
    denoise: 0.5   # lower = keep more of original image
    resolution: "match source image"

  # --- Illustrious XL ---
  illustrious_single_person:
    steps: 25
    cfg_scale: 7
    sampler: euler_ancestral
    scheduler: karras
    denoise: 1.0
    resolution: "832x1216"   # portrait; use 1024x1024 for square

  illustrious_multi_person:
    steps: 25
    cfg_scale: 5
    sampler: euler_ancestral
    scheduler: karras
    denoise: 1.0
    resolution: "1024x1024"

  illustrious_img2img:
    steps: 25
    cfg_scale: 7
    sampler: euler_ancestral
    scheduler: karras
    denoise: 0.5
    resolution: "match source image"
