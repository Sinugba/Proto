# ---------------------------------------------------------------------------

general_negative:
  description: "Universal negative prompt — safe to use with any style"
  negative: >
    score_4, score_5, score_6, bad anatomy, extra limbs, deformed hands,
    bad hands, missing fingers, fused fingers, low quality, blurry,
    watermark, text, ugly, disfigured, mutated

