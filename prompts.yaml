    natural lighting
  negative: >
      score_4, score_5, score_6, solo, single person, one person, 1person,
      three people, group, crowd, extra person,
      bad anatomy, deformed hands, bad hands, missing fingers, extra limbs,
      low quality, blurry, watermark, text, ugly, disfigured,
      changed face, altered face, different face, changed girl, changed woman,
      deformed face, bad face, asymmetrical face, warped face, distorted face,
      melting face,
      bad eyes, cross-eyed, poorly drawn eyes, bad nose, bad mouth,
      floating, disembodied, partial body, cut off, half body,
      incoherent background, distorted background, gibberish background,
      random patterns, noisy background, abstract background, corrupted,
      child, children, kid, kids, minor, minors, teen, teenager, underage,
      loli, shota, childlike, juvenile, baby face, school age,
      old, elderly, old man, old woman, grandpa, grandma, aged, wrinkled, senior
  tips:
    - "INPAINT MASK REQUIRED — plain img2img will not reliably add a person"
    - "CRITICAL: mask must NOT touch the existing person — leave a clear gap between mask edge and her body/face"
    - "Paint the mask only on the empty space beside her, not overlapping her at any pixel"
    - "Mask edge bleeds at high denoise — if her face still changes, add a 10-20px gap between her and the mask boundary"
    - "Extend the mask to include the floor/ground below where the boy's feet will be"
    - "same girl, unchanged face in positive + changed face in negative anchors her identity"
    - "Denoise 0.8-0.85: generating a new subject needs high freedom; lower than 0.75 = boy won't appear"
    - "If face still changes at 0.82: drop to 0.75 — trades some boy-generation quality for better face preservation"
    - "If boy appears but is partial/cut off: expand mask downward to cover full body height"
    - "KSampler: steps 30, cfg 6, dpmpp_2m, karras, denoise 0.82"

