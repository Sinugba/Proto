# ---------------------------------------------------------------------------
# KSAMPLER RECOMMENDED SETTINGS
# ---------------------------------------------------------------------------

ksampler_settings:
  single_person:
    steps: 20
    cfg_scale: 7
    sampler: dpmpp_2m
    scheduler: karras
    denoise: 1.0
    resolution: "896x1152"

  multi_person:
    steps: 30
    cfg_scale: 6
    sampler: dpmpp_2m
    scheduler: karras
    denoise: 1.0
    resolution: "1216x832"

  img2img:
    steps: 20
    cfg_scale: 7
    sampler: dpmpp_2m
    scheduler: karras
    denoise: 0.5   # lower = keep more of original image
    resolution: "match source image"
