# ===========================================================================
# ILLUSTRIOUS XL — illustriousXL_v01.safetensors (or later version)
# Model: https://civitai.com/models/795765/illustrious-xl
# Drop the .safetensors file into models/checkpoints/, then select it in
# the CheckpointLoaderSimple node in ComfyUI.
#
# Key difference from Pony: uses aesthetic quality tags instead of score_N.
# Illustrious excels at anime, illustration, and semi-realistic art styles.
# Uses Danbooru-style tags for subjects and settings.
# ===========================================================================

# ---------------------------------------------------------------------------
# ILLUSTRIOUS XL — SINGLE PERSON
# ---------------------------------------------------------------------------

illustrious_single_female:
  description: "Single female, illustration style, Illustrious XL"
  positive: >
    masterpiece, best quality, amazing quality, very aesthetic, absurdres,
    adult, 1girl, solo, detailed face, beautiful eyes, long brown hair,
    casual outfit, standing, outdoor background, natural lighting,
    sharp focus, looking at viewer
  negative: >
    worst quality, bad quality, lowres, bad anatomy, bad hands,
    missing fingers, extra digit, fewer digits, extra limbs, deformed,
    blurry, jpeg artifacts, signature, watermark, username, text, error,
    ugly, disfigured, mutated,
    child, children, kid, kids, minor, minors, teen, teenager, underage,
    loli, shota, childlike, juvenile, baby face, school age
  tips:
    - "Use masterpiece, best quality, amazing quality, very aesthetic as the quality prefix"
    - "absurdres requests high resolution output detail"
    - "Danbooru tags work well: 1girl, solo, long hair, school uniform, etc."
    - "Do NOT mix Pony score_N tags — they are ignored by Illustrious"

illustrious_single_male:
  description: "Single male, illustration style, Illustrious XL"
  positive: >
    masterpiece, best quality, amazing quality, very aesthetic, absurdres,
    adult, 1boy, solo, detailed face, short black hair,
    casual outfit, standing, outdoor background, natural lighting,
    sharp focus, looking at viewer
  negative: >
    worst quality, bad quality, lowres, bad anatomy, bad hands,
    missing fingers, extra digit, fewer digits, extra limbs, deformed,
    blurry, jpeg artifacts, signature, watermark, username, text, error,
    ugly, disfigured, mutated,
    child, children, kid, kids, minor, minors, teen, teenager, underage,
    loli, shota, childlike, juvenile, baby face, school age

# ---------------------------------------------------------------------------
