  negative: >
    worst quality, bad quality, lowres, blurry,
    solo, 3girls, 3boys, group, crowd, extra person,
    bad anatomy, bad hands, deformed, mutated,
    cartoon, anime, illustration, flat color, cel shading,
    watermark, text,
