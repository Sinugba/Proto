pony_img2img_restyle:
  description: "Restyle an existing image, preserve composition — Pony Diffusion V6 XL"
  positive: >
    score_9, score_8_up, score_7_up, source_realistic,
    masterpiece, high quality, detailed skin, sharp focus,
    consistent background, coherent background, clean background,
    natural lighting, same setting as original
  negative: >
    score_4, score_5, score_6, bad anatomy, deformed hands, bad hands,
    missing fingers, low quality, blurry, watermark, text, ugly, disfigured,
    incoherent background, distorted background, gibberish background,
    random patterns, noisy background, abstract background, corrupted,
    child, children, kid, kids, minor, minors, teen, teenager, underage,
    loli, shota, childlike, juvenile, baby face, school age,
    old, elderly, old man, old woman, grandpa, grandma, aged, wrinkled, senior
  tips:
    - "Gibberish background = denoise too high. Keep denoise at 0.4-0.55"
