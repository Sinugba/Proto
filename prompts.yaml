# ---------------------------------------------------------------------------
# KSAMPLER RECOMMENDED SETTINGS
# ---------------------------------------------------------------------------

ksampler_settings:
  # --- Pony Diffusion V6 XL ---
  pony_single_person:
    steps: 20
    cfg_scale: 7
    sampler: dpmpp_2m
    scheduler: karras
    denoise: 1.0
    resolution: "896x1152"

  pony_multi_person:
    steps: 30
    cfg_scale: 6
    sampler: dpmpp_2m
    scheduler: karras
    denoise: 1.0
    resolution: "1216x832"

  pony_img2img:
    steps: 20
    cfg_scale: 7
    sampler: dpmpp_2m
    scheduler: karras
    denoise: 0.5   # lower = keep more of original image
    resolution: "match source image"

  # --- Illustrious XL ---
  illustrious_single_person:
    steps: 25
    cfg_scale: 7
    sampler: euler_ancestral
    scheduler: karras
    denoise: 1.0
    resolution: "832x1216"   # portrait; use 1024x1024 for square

  illustrious_multi_person:
    steps: 25
    cfg_scale: 5
    sampler: euler_ancestral
    scheduler: karras
    denoise: 1.0
    resolution: "1216x1024"  # wider gives bodies room; taller gives faces more pixels vs 1024x1024

  illustrious_img2img:
    steps: 25
    cfg_scale: 7
    sampler: euler_ancestral
    scheduler: karras
    denoise: 0.5
    resolution: "match source image"

# ===========================================================================
# FLUX.1 — flux1-schnell-Q5_K_S.gguf  /  flux1-dev.safetensors
# Loader: UnetLoaderGGUF node (ComfyUI-GGUF)
# Encoders: clip_l.safetensors + t5xxl_fp8_e4m3fn.safetensors (DualCLIPLoader)
# VAE: ae.safetensors
#
# CRITICAL differences from Pony / Illustrious:
#   - Natural language sentences, NOT tag lists. Full sentences produce
#     significantly better results than comma-separated Danbooru tags.
#   - NO quality prefix tags (no score_N, masterpiece, best quality).
#     Describe quality through subject/lighting/camera language instead.
#   - FLUX.1-schnell: negative prompt is IGNORED (guidance-distilled, CFG=1).
#     Include negatives anyway — they are used by FLUX.1-dev.
#   - FLUX.1-dev supports negatives at CFG 3.5.
#   - Native resolution 1024x1024. Use multiples of 64 for other ratios.
# ===========================================================================

