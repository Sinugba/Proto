# Pony Diffusion V6 XL — Prompt Library
# Usage: Copy the positive/negative values into the CLIP Text Encode nodes in ComfyUI.
# All prompts use the standard quality prefix: score_9, score_8_up, score_7_up

# ---------------------------------------------------------------------------
# SINGLE PERSON — REALISTIC
# ---------------------------------------------------------------------------

realistic_single_female:
  description: "Single female, photorealistic, outdoor"
  positive: >
    score_9, score_8_up, score_7_up, source_realistic, 1girl, solo,
    detailed face, beautiful eyes, long brown hair, casual outfit, standing,
    outdoor background, natural lighting, masterpiece, high quality,
    detailed skin, sharp focus, looking at viewer
  negative: >
    score_4, score_5, score_6, bad anatomy, extra limbs, deformed hands,
    bad hands, missing fingers, fused fingers, mutated, low quality, blurry,
    watermark, text, ugly, disfigured
  tips:
    - "Use 1girl / 1boy / 1person to define subject count and gender"
    - "Add solo to keep focus on a single subject"
    - "Describe hair, clothing, and setting for more control"
    - "Always include deformed hands, bad hands, missing fingers in negative"

realistic_single_male:
  description: "Single male, photorealistic, outdoor"
  positive: >
    score_9, score_8_up, score_7_up, source_realistic, 1boy, solo,
    detailed face, short black hair, casual outfit, standing,
    outdoor background, natural lighting, masterpiece, high quality,
    detailed skin, sharp focus, looking at viewer
  negative: >
    score_4, score_5, score_6, bad anatomy, extra limbs, deformed hands,
    bad hands, missing fingers, fused fingers, mutated, low quality, blurry,
    watermark, text, ugly, disfigured

# ---------------------------------------------------------------------------
# MULTI-PERSON — REALISTIC
# ---------------------------------------------------------------------------

realistic_boy_and_girl:
  description: "1 boy + 1 girl, photorealistic, standing together"
  positive: >
    score_9, score_8_up, score_7_up, source_realistic,
    (2persons:1.4), (1boy:1.3), (1girl:1.3), duo, two people,
    both fully visible, standing side by side, detailed faces,
    natural lighting, casual outfits, outdoor background,
    masterpiece, high quality, wide shot
  negative: >
    score_4, score_5, score_6, solo, single person, one person, 1person,
    bad anatomy, extra limbs, deformed hands, bad hands, missing fingers,
    fused fingers, extra fingers, low quality, blurry, watermark, text,
    ugly, disfigured, mutated, three people, cropped
  tips:
    - "Use (2persons:1.4) weight emphasis to force two subjects"
    - "Add solo, single person to the negative prompt"
    - "Lower CFG scale to 5-6 and increase steps to 30+ if anatomy is off"
    - "Use width 1216, height 832 for better two-person composition"
    - "Differentiate subjects: 1boy with short black hair, 1girl with long blonde hair"

# ---------------------------------------------------------------------------
# SINGLE PERSON — CARTOON
# ---------------------------------------------------------------------------

cartoon_single_male:
  description: "Single male, western cartoon style"
  positive: >
    score_9, score_8_up, score_7_up, source_cartoon, 1boy, solo,
    expressive face, stylized proportions, colorful outfit, dynamic pose,
    bright background, masterpiece, high quality, clean lineart, vibrant colors
  negative: >
    score_4, score_5, score_6, bad anatomy, extra limbs, deformed,
    low quality, blurry, realistic, photo, watermark, text, grainy
  tips:
    - "Add clean lineart and vibrant colors for cartoon aesthetic"
    - "Use dynamic pose or action pose for energetic compositions"
    - "Add realistic and photo to negative to prevent photorealism drift"
    - "expressive face works well for exaggerated readable emotions"

# ---------------------------------------------------------------------------
