  description: "Landscape scene — FLUX.1"
  positive: >
    A sweeping photorealistic landscape photograph of a mountain valley at
    sunrise. Snow-capped peaks reflect orange and pink light. A winding river
    cuts through a green meadow below. Long exposure, ultra-sharp foreground,
    dramatic sky with scattered clouds. Shot on a wide-angle 16mm lens, tripod,
    f/11, golden hour light.
  negative: >
    blurry, low resolution, watermark, text overlay, cartoon, oversaturated,
    HDR clipping, lens flare artifacts, people, person, human figure

flux_interior:
  description: "Interior room scene — FLUX.1"
  positive: >
    A photorealistic interior photograph of a modern minimalist living room.
    Large floor-to-ceiling windows let in soft diffused daylight. The room
    features a low white sofa, a concrete coffee table, a single potted plant,
    and polished wooden floors. Clean lines, neutral palette, architectural
    photography style, tack-sharp focus throughout, no people.
  negative: >
    blurry, low resolution, watermark, text, cartoon, people, person,
    human figure, cluttered, dark, gloomy

# ---------------------------------------------------------------------------
# FLUX.1 — KSAMPLER SETTINGS
# ---------------------------------------------------------------------------

flux_ksampler_settings:
  schnell:
    steps: 4
    cfg_scale: 1.0
    sampler: euler
    scheduler: simple
    denoise: 1.0
    resolution: "1024x1024"
    notes: >
      Negative prompt is ignored. CFG must be 1.0 for schnell.
      4 steps is the designed inference count — more steps do not improve quality.
      Use 1216x832 for landscape / two-person shots.
      Expect 30-60s per image on 8 GB VRAM with --lowvram.

  dev:
    steps: 20
    cfg_scale: 3.5
    sampler: euler
    scheduler: simple
    denoise: 1.0
    resolution: "1024x1024"
    notes: >
      FLUX.1-dev supports negative prompts at CFG 3.5.
      Requires ~16 GB VRAM at full precision; use GGUF Q5_K_S with --lowvram
      on 8 GB cards (slower than schnell).

  img2img:
    steps: 10
    cfg_scale: 1.0
    sampler: euler
    scheduler: simple
    denoise: 0.6
    resolution: "match source image"
    notes: >
      Schnell img2img: keep denoise at 0.5-0.7. Higher = more change.
      FLUX.1 does not use an inpaint model the same way SDXL does;
      use ComfyUI inpaint nodes with a masked latent for region control.
